# Small instance configuration (50 blocks, 6 SPMTs)

inherit_from: default.yaml

# Override specific fields
n_blocks: 50
n_spmts: 6
n_cranes: 2

# HHI-specific overrides
n_ships: 1
n_blocks_per_ship: 50

max_time: 2000

# Stochastic simulation extensions
extensions:
  enable_spatial: true
  enable_shifts: true
  enable_weather: true
  labor_leveling: true
  duration_uncertainty: true
