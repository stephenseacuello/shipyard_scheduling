# Wandb sweep configuration for DAgger hyperparameter optimization on small instance
# Based on results from tiny instance sweep - these are the optimal ranges
# NOTE: Small instance takes longer (~15-30 min per run vs ~5 min for tiny)

program: experiments/train_dagger_sweep.py
method: bayes
metric:
  name: dagger_vs_expert_percent
  goal: maximize

parameters:
  # Learning rate - higher LRs performed well
  lr:
    distribution: log_uniform_values
    min: 1e-3
    max: 1e-2

  # Hidden dimension - 256 outperformed 128
  hidden-dim:
    values: [256, 512]

  # Iterations - more iterations generally better
  iterations:
    values: [5, 8, 10]

  # These settings work well for small instance
  init-episodes:
    value: 15

  dagger-episodes:
    value: 8

  train-epochs:
    value: 15

  beta-start:
    value: 1.0

  beta-end:
    value: 0.1

  # Use small instance (50 blocks, 6 SPMTs)
  config:
    value: config/small_instance.yaml

  seed:
    value: 42
