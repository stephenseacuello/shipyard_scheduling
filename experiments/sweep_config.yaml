# Wandb Sweep Configuration for Shipyard Scheduling RL
# Run with: wandb sweep experiments/sweep_config.yaml
# Then: wandb agent <sweep_id>

program: experiments/train_sweep.py
method: bayes  # Bayesian optimization for efficient hyperparameter search
metric:
  name: final/throughput
  goal: maximize

parameters:
  # PPO Hyperparameters
  lr:
    distribution: log_uniform_values
    min: 1e-5
    max: 1e-3

  gamma:
    values: [0.95, 0.99, 0.995]

  gae_lambda:
    values: [0.9, 0.95, 0.97]

  clip_epsilon:
    values: [0.1, 0.2, 0.3]

  entropy_coef:
    distribution: log_uniform_values
    min: 0.001
    max: 0.5

  value_coef:
    values: [0.25, 0.5, 1.0]

  # Exploration
  epsilon:
    distribution: uniform
    min: 0.05
    max: 0.3

  # Architecture
  hidden_dim:
    values: [64, 128, 256]

  gnn_layers:
    values: [2, 3, 4]

  # Training
  batch_size:
    values: [32, 64, 128]

  n_epochs:
    values: [3, 4, 5]

  # Environment
  warmup_steps:
    values: [5, 10, 20]

  # Fixed parameters (not swept but logged)
  seed:
    value: 42

  epochs:
    value: 50

  steps_per_epoch:
    value: 500

# Early termination for poorly performing runs
early_terminate:
  type: hyperband
  min_iter: 10
  eta: 3
  s: 2
